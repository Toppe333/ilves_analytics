<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auroraliiga Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--border:#2a3450;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#38bdf8;--goal:#22c55e;--save:#06b6d4;--block:#6366f1;--miss:#ef4444;--ilves:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.mono{font-family:'JetBrains Mono',monospace}
.header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-wrap:wrap;gap:8px}
.header h1{font-size:19px;font-weight:700;letter-spacing:-.5px;white-space:nowrap}.header h1 span{color:var(--ilves)}
.nav{display:flex;gap:3px;flex-wrap:wrap}.nav button{padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.nav button:hover{border-color:var(--accent);color:var(--accent)}.nav button.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.filters{padding:8px 24px;display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2)}
.fg{display:flex;flex-direction:column;gap:2px}.fg label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.fg select,.fg input{padding:4px 7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:4px;font-size:11px;font-family:inherit}
.fg input[type=text]{min-width:120px}.fg input[type=number]{width:60px}
.chip-row{display:flex;gap:3px;flex-wrap:wrap}.chip{padding:2px 7px;border:1px solid var(--border);border-radius:3px;font-size:10px;cursor:pointer;background:transparent;color:var(--text2);transition:all .12s;font-family:inherit}
.chip:hover{border-color:var(--accent);color:var(--accent)}.chip.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.content{padding:16px 24px;max-width:1440px;margin:0 auto}.grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}.card h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;font-weight:600}
.big{font-size:28px;font-weight:700;letter-spacing:-1px}
table{width:100%;border-collapse:collapse;font-size:11px}table th{text-align:left;padding:5px 6px;font-weight:600;color:var(--text3);border-bottom:2px solid var(--border);text-transform:uppercase;font-size:9px;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap}
table th:hover{color:var(--accent)}table td{padding:4px 6px;border-bottom:1px solid rgba(42,52,80,.35)}table tr:hover{background:rgba(56,189,248,.04)}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px}
.rink-svg{width:100%;height:auto}
.legend{display:flex;gap:12px;margin:6px 0;font-size:10px;flex-wrap:wrap}.legend span{display:flex;align-items:center;gap:3px}.legend .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.loading{display:flex;align-items:center;justify-content:center;height:40vh;flex-direction:column;gap:10px}.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.scroll-table{max-height:560px;overflow-y:auto}.scroll-table thead{position:sticky;top:0;background:var(--bg2);z-index:1}
.pg{display:flex;gap:4px;align-items:center;justify-content:center;margin-top:8px;font-size:11px}.pg button{padding:3px 8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:3px;cursor:pointer;font-family:inherit;font-size:11px}.pg button:disabled{opacity:.3}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}.content{padding:10px}.header,.filters{padding:8px 12px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback}=React;
const ALL_S=['2023-24','2024-25','2025-26'],ALL_T=['HIFK','HPK','Ilves','K-Espoo','KalPa','Kuortane','Kärpät','RoKi','TPS'];
const EN=['Ohi','Maali','Torjunta','Peitetty'];

function Rink({shots,w=860,h=420}){
  const sx=w/1024,sy=h/514,cols={0:'#ef4444',1:'#22c55e',2:'#06b6d4',3:'#6366f1'},sz={0:2,1:4.5,2:2,3:2};
  const shown=shots.slice(0,8000);
  return(<svg viewBox={`0 0 ${w} ${h}`} className="rink-svg" style={{background:'#111827',borderRadius:8}}>
    <rect x={2} y={2} width={w-4} height={h-4} rx={h*.28} fill="none" stroke="#2a3450" strokeWidth={2}/>
    <line x1={w/2} y1={2} x2={w/2} y2={h-2} stroke="#ef4444" strokeWidth={2} opacity={.3}/>
    <line x1={w*.381} y1={2} x2={w*.381} y2={h-2} stroke="#38bdf8" strokeWidth={1.5} opacity={.2}/>
    <line x1={w*.619} y1={2} x2={w*.619} y2={h-2} stroke="#38bdf8" strokeWidth={1.5} opacity={.2}/>
    <line x1={w*.068} y1={h*.045} x2={w*.068} y2={h*.955} stroke="#ef4444" strokeWidth={1} opacity={.25}/>
    <line x1={w*.932} y1={h*.045} x2={w*.932} y2={h*.955} stroke="#ef4444" strokeWidth={1} opacity={.25}/>
    <rect x={w*.055} y={h/2-13} width={15} height={26} rx={2} fill="none" stroke="#ef4444" strokeWidth={1.5} opacity={.5}/>
    <rect x={w*.945-15} y={h/2-13} width={15} height={26} rx={2} fill="none" stroke="#ef4444" strokeWidth={1.5} opacity={.5}/>
    <circle cx={w/2} cy={h/2} r={h*.14} fill="none" stroke="#38bdf8" strokeWidth={1} opacity={.15}/>
    {shown.map((s,i)=><circle key={i} cx={s.x*sx} cy={s.y*sy} r={sz[s.e]||2} fill={cols[s.e]||'#888'} opacity={s.e===1?.85:.22} stroke={s.e===1?"#fff":"none"} strokeWidth={s.e===1?.8:0}/>)}
  </svg>);
}
function GoalNet({shots,w=260,h=182}){
  const gs=shots.filter(s=>s.e===1&&s.gx>0&&s.gy>0);
  if(!gs.length)return<div style={{color:'var(--text3)',fontSize:11,padding:20}}>Ei osumapaikkadataa (saatavilla 2023-25)</div>;
  const sx=w/200,sy=h/140;
  return(<svg viewBox={`0 0 ${w} ${h}`} style={{background:'#1a2236',borderRadius:6,border:'2px solid var(--miss)'}}>
    <line x1={0} y1={h/2} x2={w} y2={h/2} stroke="#333" strokeWidth={.5} strokeDasharray="4"/>
    <line x1={w/2} y1={0} x2={w/2} y2={h} stroke="#333" strokeWidth={.5} strokeDasharray="4"/>
    <text x={w/2} y={12} textAnchor="middle" fill="#555" fontSize={9}>ylä</text>
    <text x={w/2} y={h-4} textAnchor="middle" fill="#555" fontSize={9}>ala</text>
    {gs.map((g,i)=><circle key={i} cx={g.gx*sx} cy={g.gy*sy} r={4} fill="var(--goal)" opacity={.55} stroke="#fff" strokeWidth={.5}/>)}
  </svg>);
}
function Chips({options,selected,onChange}){
  return<div className="chip-row">{options.map(o=><button key={o} className={`chip ${selected.includes(o)?'on':''}`} onClick={()=>onChange(selected.includes(o)?selected.filter(x=>x!==o):[...selected,o])}>{o}</button>)}</div>;
}
function SC({title,value,sub}){return<div className="card"><h3>{title}</h3><div className="big mono">{value}</div>{sub&&<div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{sub}</div>}</div>}
function ST({columns,data,pageSize=50,hl=''}){
  const[sort,setSort]=useState({c:null,a:false});const[pg,setPg]=useState(0);
  const sd=useMemo(()=>{if(!sort.c)return data;return[...data].sort((a,b)=>{const va=a[sort.c],vb=b[sort.c];if(va==null)return 1;if(vb==null)return-1;return sort.a?(va>vb?1:-1):(va<vb?1:-1)})},[data,sort]);
  const p=sd.slice(pg*pageSize,(pg+1)*pageSize),pages=Math.ceil(sd.length/pageSize);
  useEffect(()=>setPg(0),[data]);
  return<div><div className="scroll-table"><table><thead><tr>{columns.map(c=><th key={c.k} className={c.n?'num':''} onClick={()=>setSort({c:c.k,a:sort.c===c.k?!sort.a:false})} style={{color:sort.c===c.k?'var(--accent)':undefined}}>{c.l}{sort.c===c.k?(sort.a?' ↑':' ↓'):''}</th>)}</tr></thead>
  <tbody>{p.map((r,i)=>{const ih=hl&&r.tm===hl;return<tr key={i} style={ih?{background:'rgba(245,158,11,.07)'}:undefined}>{columns.map(c=>{let v=c.f?c.f(r[c.k],r):r[c.k];const st={};if(c.k==='tm'&&ih){st.color='var(--ilves)';st.fontWeight=600}if(c.k==='xgd'){const nv=typeof v==='number'?v:parseFloat(v);if(!isNaN(nv))st.color=nv>0?'var(--goal)':'var(--miss)'}return<td key={c.k} className={c.n?'num':''} style={st}>{typeof v==='number'&&c.d!=null?v.toFixed(c.d):v}</td>})}</tr>})}</tbody></table></div>
  {pages>1&&<div className="pg"><button disabled={pg===0} onClick={()=>setPg(pg-1)}>←</button><span className="mono" style={{fontSize:10,color:'var(--text3)'}}>{pg+1}/{pages} ({sd.length})</span><button disabled={pg>=pages-1} onClick={()=>setPg(pg+1)}>→</button></div>}</div>;
}

function App(){
  const[tab,setTab]=useState('standings');const[ss,setSs]=useState(['2025-26']);const[tm,setTm]=useState('');const[hlTm,setHlTm]=useState('Ilves');
  const[teams,setTeams]=useState([]);const[players,setPlayers]=useState([]);const[shots,setShots]=useState([]);const[ld,setLd]=useState(true);const[sld,setSld]=useState(false);
  const[sTypes,setSTypes]=useState([0,1,2,3]);const[sPlayer,setSPlayer]=useState('');const[sOpps,setSOpps]=useState([]);const[sGk,setSGk]=useState('');const[sStr,setSStr]=useState([]);
  const[pSearch,setPSearch]=useState('');const[pPos,setPPos]=useState('');const[pMinSh,setPMinSh]=useState(0);const[pMinGp,setPMinGp]=useState(0);const[pTm,setPTm]=useState('');
  const[lSearch,setLSearch]=useState('');const[lTm,setLTm]=useState('');

  useEffect(()=>{Promise.all([fetch('data/teams.json').then(r=>r.json()),fetch('data/players.json').then(r=>r.json())]).then(([t,p])=>{setTeams(t);setPlayers(p);setLd(false)})},[]);
  const loadS=useCallback(()=>{if(!sld){fetch('data/shots.json').then(r=>r.json()).then(d=>{setShots(d);setSld(true)})}},[sld]);
  useEffect(()=>{if(['shotmap','shots','goalnet'].includes(tab))loadS()},[tab]);

  const fShots=useMemo(()=>{if(!shots.length)return[];let f=shots.filter(s=>ss.includes(s.s));if(tm)f=f.filter(s=>s.tm===tm);if(sTypes.length<4)f=f.filter(s=>sTypes.includes(s.e));if(sPlayer)f=f.filter(s=>s.sn.toLowerCase().includes(sPlayer.toLowerCase()));if(sOpps.length)f=f.filter(s=>sOpps.includes(s.opp));if(sGk)f=f.filter(s=>s.bn.toLowerCase().includes(sGk.toLowerCase()));if(sStr.length)f=f.filter(s=>sStr.includes(s.str));return f},[shots,ss,tm,sTypes,sPlayer,sOpps,sGk,sStr]);

  const sum=useMemo(()=>{const f=fShots;if(!f.length)return null;const g=f.filter(s=>s.e===1).length,t=f.length,xg=f.reduce((a,s)=>a+s.xg,0),sv=f.filter(s=>s.e===2).length;return{g,t,xg,sh:(g/(g+sv)*100).toFixed(1),gxg:(g-xg).toFixed(1),sv,bl:f.filter(s=>s.e===3).length,mi:f.filter(s=>s.e===0).length,rb:f.filter(s=>s.rb).length,pp:f.filter(s=>s.str==='PP').length}},[fShots]);

  const fPlayers=useMemo(()=>{let f=players.filter(p=>ss.includes(p.s));if(pTm)f=f.filter(p=>p.tm===pTm);if(pPos)f=f.filter(p=>p.pos===pPos);if(pMinSh>0)f=f.filter(p=>p.sh>=pMinSh);if(pMinGp>0)f=f.filter(p=>p.gp>=pMinGp);if(pSearch)f=f.filter(p=>p.n.toLowerCase().includes(pSearch.toLowerCase()));return f},[players,ss,pTm,pPos,pMinSh,pMinGp,pSearch]);

  const lShots=useMemo(()=>{if(!shots.length)return[];let f=shots.filter(s=>ss.includes(s.s));if(lTm)f=f.filter(s=>s.tm===lTm);if(lSearch)f=f.filter(s=>s.sn.toLowerCase().includes(lSearch.toLowerCase())||s.bn.toLowerCase().includes(lSearch.toLowerCase()));return f},[shots,ss,lTm,lSearch]);

  const goalies=useMemo(()=>{if(!shots.length)return[];const m={};shots.filter(s=>ss.includes(s.s)&&s.e<=2&&s.bn).forEach(s=>{if(!m[s.bn])m[s.bn]={n:s.bn,sv:0,ga:0,xga:0,tm:''};if(s.e===2){m[s.bn].sv++;m[s.bn].tm=s.opp||m[s.bn].tm}if(s.e===1){m[s.bn].ga++;m[s.bn].xga+=s.xg;m[s.bn].tm=s.opp||m[s.bn].tm}});return Object.values(m).filter(g=>g.sv>20).sort((a,b)=>b.sv-a.sv)},[shots,ss]);

  if(ld)return<div className="loading"><div className="spinner"/></div>;

  const SC_=(
    <div className="fg"><label>Kaudet</label><Chips options={ALL_S} selected={ss} onChange={setSs}/></div>
  );

  return(<div>
    <div className="header">
      <h1>🏒 <span>Aurora</span>liiga Analytics</h1>
      <div className="nav">{[['standings','Taulukko'],['shotmap','Laukaisukartta'],['goalnet','Maali'],['players','Pelaajat'],['shots','Laukaukset']].map(([k,v])=><button key={k} className={tab===k?'active':''} onClick={()=>setTab(k)}>{v}</button>)}</div>
    </div>

    {tab==='standings'&&<div>
      <div className="filters">{SC_}</div>
      <div className="content"><div className="card"><h3>Sarjataulukko</h3>
        <ST hl="Ilves" columns={[{k:'tm',l:'Joukkue'},{k:'gp',l:'O',n:1},{k:'w',l:'V',n:1},{k:'wot',l:'VJ',n:1},{k:'lot',l:'HJ',n:1},{k:'l',l:'H',n:1},{k:'pts',l:'P',n:1},{k:'gf',l:'TM',n:1},{k:'ga',l:'PM',n:1},{k:'sf',l:'LF',n:1},{k:'sa',l:'LA',n:1},{k:'xgf',l:'xGF',n:1,d:1},{k:'xga',l:'xGA',n:1,d:1},{k:'xgd',l:'xG±',n:1,d:1,f:(_,r)=>Math.round((r.xgf-r.xga)*10)/10},{k:'sh_pct',l:'L%',n:1,f:v=>v+'%'},{k:'sv_pct',l:'T%',n:1,f:v=>v+'%'}]}
          data={(()=>{const a={};teams.filter(t=>ss.includes(t.s)).forEach(t=>{if(!a[t.tm])a[t.tm]={tm:t.tm,gp:0,w:0,wot:0,lot:0,l:0,pts:0,gf:0,ga:0,sf:0,sa:0,xgf:0,xga:0,_g:0,_ga:0};const o=a[t.tm];o.gp+=t.gp;o.w+=t.w;o.wot+=t.wot;o.lot+=t.lot;o.l+=t.l;o.pts+=t.pts;o.gf+=t.gf;o.ga+=t.ga;o.sf+=t.sf;o.sa+=t.sa;o.xgf+=t.xgf;o.xga+=t.xga;o._g+=Math.round(t.sh_pct/100*t.sf);o._ga+=Math.round((1-t.sv_pct/100)*t.sa)});return Object.values(a).map(o=>({...o,xgf:Math.round(o.xgf*10)/10,xga:Math.round(o.xga*10)/10,sh_pct:o.sf?(o._g/o.sf*100).toFixed(1):'0',sv_pct:o.sa?((1-o._ga/o.sa)*100).toFixed(1):'0'})).sort((a,b)=>b.pts-a.pts)})()}
          pageSize={9}/>
      </div></div>
    </div>}

    {tab==='shotmap'&&<div>
      <div className="filters" style={{gap:6}}>{SC_}
        <div className="fg"><label>Joukkue</label><select value={tm} onChange={e=>setTm(e.target.value)}><option value="">Kaikki</option>{ALL_T.map(t=><option key={t}>{t}</option>)}</select></div>
        <div className="fg"><label>Tyyppi</label><Chips options={EN} selected={sTypes.map(t=>EN[t])} onChange={s=>setSTypes(s.map(x=>EN.indexOf(x)))}/></div>
        <div className="fg"><label>Tilanne</label><Chips options={['EV','PP','SH']} selected={sStr} onChange={setSStr}/></div>
        <div className="fg"><label>Laukaisija</label><input type="text" value={sPlayer} onChange={e=>setSPlayer(e.target.value)} placeholder="Nimi..."/></div>
        <div className="fg"><label>Vastustaja</label><Chips options={ALL_T} selected={sOpps} onChange={setSOpps}/></div>
        <div className="fg"><label>Maalivahti</label><input type="text" value={sGk} onChange={e=>setSGk(e.target.value)} placeholder="Nimi..."/></div>
      </div>
      <div className="content">{!sld?<div className="loading" style={{height:'30vh'}}><div className="spinner"/></div>:<>
        {sum&&<div className="grid g4" style={{marginBottom:14}}>
          <SC title="Laukaukset" value={sum.t.toLocaleString()} sub={`${sum.pp} YV · ${sum.rb} rebound`}/>
          <SC title="Maalit / xG" value={`${sum.g} / ${sum.xg.toFixed(1)}`}/>
          <SC title="L%" value={sum.sh+'%'} sub={`${sum.g}M / ${sum.g+sum.sv} LMK`}/>
          <SC title="G − xG" value={(parseFloat(sum.gxg)>0?'+':'')+sum.gxg}/>
        </div>}
        <div className="card">
          <h3>Laukaisukartta ({fShots.length} laukausta{fShots.length>8000?' — näytetään 8000':''})</h3>
          <div className="legend"><span><div className="dot" style={{background:'var(--goal)'}}/>Maali</span><span><div className="dot" style={{background:'var(--save)'}}/>Torjunta</span><span><div className="dot" style={{background:'var(--block)'}}/>Peitetty</span><span><div className="dot" style={{background:'var(--miss)'}}/>Ohi</span></div>
          <Rink shots={fShots}/>
        </div>
      </>}</div>
    </div>}

    {tab==='goalnet'&&<div>
      <div className="filters">{SC_}
        <div className="fg"><label>Maalivahti</label><select value={sGk} onChange={e=>setSGk(e.target.value)}><option value="">Kaikki</option>{goalies.map(g=><option key={g.n} value={g.n}>{g.n} ({g.ga}GA/{g.sv}SV)</option>)}</select></div>
        <div className="fg"><label>Laukaiseva joukkue</label><select value={tm} onChange={e=>setTm(e.target.value)}><option value="">Kaikki</option>{ALL_T.map(t=><option key={t}>{t}</option>)}</select></div>
      </div>
      <div className="content">{!sld?<div className="loading" style={{height:'30vh'}}><div className="spinner"/></div>:
        <div className="grid g2">
          <div className="card"><h3>Maalin osumapaikat {sGk&&`— ${sGk}`}</h3><GoalNet shots={fShots}/><div style={{fontSize:10,color:'var(--text3)',marginTop:6}}>{fShots.filter(s=>s.e===1&&s.gx>0).length} maalia osumapaikkadatalla</div></div>
          <div className="card"><h3>Maalivahdit</h3>
            <ST columns={[{k:'n',l:'Maalivahti'},{k:'sv',l:'Torj',n:1},{k:'ga',l:'PM',n:1},{k:'sv_pct',l:'T%',n:1,d:1,f:(_,r)=>((r.sv/(r.sv+r.ga))*100).toFixed(1)+'%'},{k:'xga',l:'xGA',n:1,d:1},{k:'gsax',l:'GSAx',n:1,d:1,f:(_,r)=>{const v=r.xga-r.ga;return v}}]} data={goalies.map(g=>({...g,sv_pct:(g.sv/(g.sv+g.ga))*100,gsax:g.xga-g.ga}))} pageSize={20}/>
          </div>
        </div>
      }</div>
    </div>}

    {tab==='players'&&<div>
      <div className="filters">{SC_}
        <div className="fg"><label>Joukkue</label><select value={pTm} onChange={e=>setPTm(e.target.value)}><option value="">Kaikki</option>{ALL_T.map(t=><option key={t}>{t}</option>)}</select></div>
        <div className="fg"><label>Korosta</label><select value={hlTm} onChange={e=>setHlTm(e.target.value)}><option value="">-</option>{ALL_T.map(t=><option key={t}>{t}</option>)}</select></div>
        <div className="fg"><label>Pelipaikka</label><Chips options={['H','P']} selected={pPos?[pPos]:[]} onChange={s=>setPPos(s.length?s[s.length-1]:'')}/></div>
        <div className="fg"><label>Hae</label><input type="text" value={pSearch} onChange={e=>setPSearch(e.target.value)} placeholder="Nimi..."/></div>
        <div className="fg"><label>Min lk</label><input type="number" value={pMinSh} onChange={e=>setPMinSh(+e.target.value)} min={0}/></div>
        <div className="fg"><label>Min pelit</label><input type="number" value={pMinGp} onChange={e=>setPMinGp(+e.target.value)} min={0}/></div>
      </div>
      <div className="content"><div className="card"><h3>Pelaajat ({fPlayers.length})</h3>
        <ST hl={hlTm} columns={[{k:'n',l:'Pelaaja'},{k:'tm',l:'Joukkue'},{k:'pos',l:'PP'},{k:'s',l:'Kausi'},{k:'gp',l:'O',n:1},{k:'sh',l:'Lk',n:1},{k:'g',l:'M',n:1},{k:'xg',l:'xG',n:1,d:1},{k:'xgd',l:'G-xG',n:1,d:1,f:v=>(v>0?'+':'')+v.toFixed(1)},{k:'slot',l:'Slot',n:1},{k:'rb',l:'RB',n:1},{k:'toi',l:'TOI',n:1,d:0},{k:'toi_pg',l:'TOI/G',n:1,d:1},{k:'xg60',l:'xG/60',n:1,d:2}]} data={fPlayers} pageSize={50}/>
      </div></div>
    </div>}

    {tab==='shots'&&<div>
      <div className="filters">{SC_}
        <div className="fg"><label>Joukkue</label><select value={lTm} onChange={e=>setLTm(e.target.value)}><option value="">Kaikki</option>{ALL_T.map(t=><option key={t}>{t}</option>)}</select></div>
        <div className="fg"><label>Hae</label><input type="text" value={lSearch} onChange={e=>setLSearch(e.target.value)} placeholder="Pelaaja / maalivahti..."/></div>
      </div>
      <div className="content">{!sld?<div className="loading" style={{height:'30vh'}}><div className="spinner"/></div>:
        <div className="card"><h3>Laukaukset ({lShots.length})</h3>
          <ST columns={[{k:'s',l:'Kausi'},{k:'g',l:'#',n:1},{k:'p',l:'Erä',n:1},{k:'_t',l:'Aika',f:(_,r)=>`${Math.floor(r.t/60)}:${String(r.t%60).padStart(2,'0')}`},{k:'tm',l:'Joukkue'},{k:'opp',l:'Vast.'},{k:'sn',l:'Laukaisija'},{k:'sj',l:'#'},{k:'_e',l:'Tulos',f:(_,r)=>EN[r.e]},{k:'bn',l:'Torjuja'},{k:'d',l:'Et.',n:1,d:1,f:v=>v.toFixed(1)+'m'},{k:'va',l:'Kulma',n:1,d:1,f:v=>v.toFixed(1)+'°'},{k:'xg',l:'xG',n:1,d:3},{k:'str',l:'Til.'},{k:'gt',l:'Tyyppi'}]} data={lShots} pageSize={100}/>
        </div>
      }</div>
    </div>}
  </div>);
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
