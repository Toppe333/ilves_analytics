<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auroraliiga Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2236;
  --border: #2a3450;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --goal: #22c55e;
  --save: #06b6d4;
  --block: #6366f1;
  --miss: #ef4444;
  --ilves: #f59e0b;
  --gold: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.mono { font-family:'JetBrains Mono',monospace; }

.header { padding:24px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--bg2); }
.header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.header h1 span { color:var(--ilves); }
.nav { display:flex; gap:4px; }
.nav button { padding:8px 16px; border:1px solid var(--border); background:transparent; color:var(--text2); border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit; transition:all .2s; }
.nav button:hover { border-color:var(--accent); color:var(--accent); }
.nav button.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:600; }

.filters { padding:16px 32px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg2); }
.filters select { padding:6px 12px; border:1px solid var(--border); background:var(--bg3); color:var(--text); border-radius:6px; font-size:13px; font-family:inherit; }
.filters label { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }

.content { padding:24px 32px; max-width:1400px; margin:0 auto; }

.grid { display:grid; gap:20px; }
.grid-2 { grid-template-columns:1fr 1fr; }
.grid-3 { grid-template-columns:1fr 1fr 1fr; }

.card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px; }
.card h3 { font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:12px; font-weight:600; }
.card .big { font-size:36px; font-weight:700; letter-spacing:-1px; }

table { width:100%; border-collapse:collapse; font-size:13px; }
table th { text-align:left; padding:8px 10px; font-weight:600; color:var(--text2); border-bottom:2px solid var(--border); text-transform:uppercase; font-size:11px; letter-spacing:0.5px; }
table td { padding:7px 10px; border-bottom:1px solid rgba(42,52,80,0.5); }
table tr:hover { background:rgba(56,189,248,0.05); }
table .num { text-align:right; font-family:'JetBrains Mono',monospace; font-size:12px; }
table .highlight { color:var(--ilves); font-weight:600; }

.rink-container { position:relative; width:100%; max-width:900px; margin:0 auto; }
.rink-svg { width:100%; height:auto; }

.stat-bar { display:flex; align-items:center; gap:8px; margin:4px 0; }
.stat-bar .bar { flex:1; height:20px; background:var(--bg); border-radius:4px; overflow:hidden; position:relative; }
.stat-bar .fill { height:100%; border-radius:4px; transition:width .5s ease; }
.stat-bar .label { font-size:12px; color:var(--text2); min-width:80px; }
.stat-bar .val { font-size:12px; font-family:'JetBrains Mono',monospace; min-width:40px; text-align:right; }

.loading { display:flex; align-items:center; justify-content:center; height:60vh; flex-direction:column; gap:16px; }
.loading .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.xg-positive { color:var(--goal); }
.xg-negative { color:var(--miss); }

.legend { display:flex; gap:16px; margin:12px 0; font-size:12px; }
.legend span { display:flex; align-items:center; gap:4px; }
.legend .dot { width:10px; height:10px; border-radius:50%; }

@media (max-width:900px) {
  .grid-2, .grid-3 { grid-template-columns:1fr; }
  .content { padding:16px; }
  .header { padding:16px; }
  .filters { padding:12px 16px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// Ice Rink SVG component
function Rink({ shots, width = 800, height = 400 }) {
  const scaleX = width / 1024;
  const scaleY = height / 514;
  
  const colors = { 0:'#ef4444', 1:'#22c55e', 2:'#06b6d4', 3:'#6366f1' };
  const sizes = { 0:2.5, 1:5, 2:2.5, 3:2.5 };
  
  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="rink-svg" style={{background:'#1a2236', borderRadius:8}}>
      {/* Rink outline */}
      <rect x={2} y={2} width={width-4} height={height-4} rx={height*0.28} ry={height*0.28} fill="none" stroke="#2a3450" strokeWidth={2}/>
      {/* Center line */}
      <line x1={width/2} y1={2} x2={width/2} y2={height-2} stroke="#ef4444" strokeWidth={2} opacity={0.4}/>
      {/* Blue lines */}
      <line x1={width*0.381} y1={2} x2={width*0.381} y2={height-2} stroke="#38bdf8" strokeWidth={1.5} opacity={0.3}/>
      <line x1={width*0.619} y1={2} x2={width*0.619} y2={height-2} stroke="#38bdf8" strokeWidth={1.5} opacity={0.3}/>
      {/* Goal lines */}
      <line x1={width*0.068} y1={height*0.045} x2={width*0.068} y2={height*0.955} stroke="#ef4444" strokeWidth={1} opacity={0.3}/>
      <line x1={width*0.932} y1={height*0.045} x2={width*0.932} y2={height*0.955} stroke="#ef4444" strokeWidth={1} opacity={0.3}/>
      {/* Center circle */}
      <circle cx={width/2} cy={height/2} r={height*0.146} fill="none" stroke="#38bdf8" strokeWidth={1} opacity={0.2}/>
      
      {/* Shots */}
      {shots.map((s, i) => (
        <circle key={i} cx={s.x * scaleX} cy={s.y * scaleY} r={sizes[s.e] || 2.5}
          fill={colors[s.e] || '#888'} opacity={s.e === 1 ? 0.9 : 0.35} stroke={s.e===1?"#fff":"none"} strokeWidth={s.e===1?1:0}/>
      ))}
    </svg>
  );
}

// Standings Table
function StandingsTable({ teams, season }) {
  const data = teams.filter(t => t.s === season).sort((a,b) => b.pts - a.pts);
  return (
    <table>
      <thead><tr>
        <th>#</th><th>Joukkue</th><th className="num">O</th><th className="num">V</th><th className="num">VJ</th><th className="num">HJ</th><th className="num">H</th>
        <th className="num">P</th><th className="num">TM</th><th className="num">PM</th><th className="num">xGF</th><th className="num">Lk</th><th className="num">L%</th>
      </tr></thead>
      <tbody>
        {data.map((t, i) => (
          <tr key={t.tm} className={t.tm === 'Ilves' ? 'highlight' : ''}>
            <td className="num">{i+1}</td>
            <td style={{fontWeight: t.tm==='Ilves'?700:400, color: t.tm==='Ilves'?'var(--ilves)':'inherit'}}>{t.tm}</td>
            <td className="num">{t.gp}</td><td className="num">{t.w}</td><td className="num">{t.wot}</td>
            <td className="num">{t.lot}</td><td className="num">{t.l}</td>
            <td className="num" style={{fontWeight:700}}>{t.pts}</td>
            <td className="num">{t.gf}</td><td className="num">{t.ga}</td>
            <td className="num">{t.xgf}</td>
            <td className="num">{t.shots}</td>
            <td className="num">{t.sh_pct}%</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// Player xG Table
function PlayerTable({ players, season, team }) {
  const data = players
    .filter(p => p.s === season && (!team || p.tm === team))
    .sort((a,b) => b.xg - a.xg)
    .slice(0, 30);
  
  return (
    <table>
      <thead><tr>
        <th>#</th><th>Pelaaja</th><th>Joukkue</th><th className="num">Lk</th>
        <th className="num">Maalit</th><th className="num">xG</th><th className="num">G-xG</th>
      </tr></thead>
      <tbody>
        {data.map((p, i) => (
          <tr key={`${p.n}-${p.tm}`} className={p.tm === 'Ilves' ? 'highlight' : ''}>
            <td className="num">{i+1}</td>
            <td style={{fontWeight: p.tm==='Ilves'?600:400}}>{p.n}</td>
            <td style={{color: p.tm==='Ilves'?'var(--ilves)':'var(--text2)', fontSize:12}}>{p.tm}</td>
            <td className="num">{p.sh}</td>
            <td className="num">{p.g}</td>
            <td className="num">{p.xg.toFixed(1)}</td>
            <td className={`num ${p.xgd > 0 ? 'xg-positive' : 'xg-negative'}`}>
              {p.xgd > 0 ? '+' : ''}{p.xgd.toFixed(1)}
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// xG Flow chart for a team across a season
function TeamXGBars({ teams }) {
  const seasons = ['2023-24','2024-25','2025-26'];
  const ilves = teams.filter(t => t.tm === 'Ilves').sort((a,b) => a.s.localeCompare(b.s));
  
  return (
    <div>
      {ilves.map(t => (
        <div key={t.s} style={{marginBottom:16}}>
          <div style={{fontSize:13, fontWeight:600, marginBottom:6}}>{t.s}</div>
          <div style={{display:'flex', gap:20, fontSize:12}}>
            <div>
              <span style={{color:'var(--text2)'}}>Pisteet: </span>
              <span className="mono" style={{fontWeight:700, fontSize:16}}>{t.pts}</span>
            </div>
            <div>
              <span style={{color:'var(--text2)'}}>xGF: </span>
              <span className="mono" style={{color:'var(--goal)'}}>{t.xgf}</span>
            </div>
            <div>
              <span style={{color:'var(--text2)'}}>Maalit: </span>
              <span className="mono">{t.gf}</span>
            </div>
            <div>
              <span style={{color:'var(--text2)'}}>G-xG: </span>
              <span className={`mono ${t.gf - t.xgf > 0 ? 'xg-positive' : 'xg-negative'}`}>
                {t.gf - t.xgf > 0 ? '+' : ''}{(t.gf - t.xgf).toFixed(1)}
              </span>
            </div>
            <div>
              <span style={{color:'var(--text2)'}}>Laukaukset: </span>
              <span className="mono">{t.shots}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// Main App
function App() {
  const [tab, setTab] = useState('standings');
  const [season, setSeason] = useState('2025-26');
  const [team, setTeam] = useState('');
  const [teams, setTeams] = useState([]);
  const [players, setPlayers] = useState([]);
  const [shots, setShots] = useState([]);
  const [loading, setLoading] = useState(true);
  const [shotsLoading, setShotsLoading] = useState(false);

  useEffect(() => {
    Promise.all([
      fetch('data/teams.json').then(r => r.json()),
      fetch('data/players.json').then(r => r.json()),
    ]).then(([t, p]) => {
      setTeams(t);
      setPlayers(p);
      setLoading(false);
    }).catch(e => {
      console.error(e);
      setLoading(false);
    });
  }, []);

  useEffect(() => {
    if (tab === 'shotmap' && shots.length === 0) {
      setShotsLoading(true);
      fetch('data/shots.json').then(r => r.json()).then(d => {
        setShots(d);
        setShotsLoading(false);
      }).catch(() => setShotsLoading(false));
    }
  }, [tab]);

  const filteredShots = useMemo(() => {
    if (!shots.length) return [];
    let f = shots.filter(s => s.s === season);
    if (team) f = f.filter(s => s.tm === team);
    return f;
  }, [shots, season, team]);

  const seasonTeams = useMemo(() => {
    return [...new Set(teams.filter(t => t.s === season).map(t => t.tm))].sort();
  }, [teams, season]);

  // Summary cards for current filter
  const summary = useMemo(() => {
    if (!filteredShots.length) return null;
    const goals = filteredShots.filter(s => s.e === 1).length;
    const total = filteredShots.length;
    const xg = filteredShots.reduce((a,s) => a + s.xg, 0);
    return { goals, total, xg, sh_pct: (goals/total*100).toFixed(1), gxg: (goals - xg).toFixed(1) };
  }, [filteredShots]);

  if (loading) return (
    <div className="loading">
      <div className="spinner"></div>
      <div style={{color:'var(--text2)'}}>Ladataan dataa...</div>
    </div>
  );

  return (
    <div>
      <div className="header">
        <h1>🏒 <span>Aurora</span>liiga Analytics</h1>
        <div className="nav">
          {[['standings','Sarjataulukko'],['shotmap','Laukaisukartta'],['players','Pelaajat'],['ilves','Ilves']].map(([k,v]) => (
            <button key={k} className={tab===k?'active':''} onClick={() => setTab(k)}>{v}</button>
          ))}
        </div>
      </div>

      <div className="filters">
        <div>
          <label>Kausi</label><br/>
          <select value={season} onChange={e => setSeason(e.target.value)}>
            <option value="2023-24">2023-24</option>
            <option value="2024-25">2024-25</option>
            <option value="2025-26">2025-26</option>
          </select>
        </div>
        {(tab === 'shotmap' || tab === 'players') && (
          <div>
            <label>Joukkue</label><br/>
            <select value={team} onChange={e => setTeam(e.target.value)}>
              <option value="">Kaikki</option>
              {seasonTeams.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        )}
      </div>

      <div className="content">
        {tab === 'standings' && (
          <div>
            <div className="card" style={{marginBottom:20}}>
              <h3>Sarjataulukko — {season}</h3>
              <StandingsTable teams={teams} season={season} />
            </div>
          </div>
        )}

        {tab === 'shotmap' && (
          <div>
            {shotsLoading ? (
              <div className="loading" style={{height:'40vh'}}>
                <div className="spinner"></div>
                <div style={{color:'var(--text2)'}}>Ladataan laukausdataa (42 000 laukausta)...</div>
              </div>
            ) : (
              <>
                {summary && (
                  <div className="grid grid-3" style={{marginBottom:20}}>
                    <div className="card">
                      <h3>Laukaukset</h3>
                      <div className="big mono">{summary.total.toLocaleString()}</div>
                    </div>
                    <div className="card">
                      <h3>Maalit / xG</h3>
                      <div className="big mono">{summary.goals} <span style={{fontSize:18,color:'var(--text2)'}}>/</span> <span style={{fontSize:24, color:'var(--accent)'}}>{summary.xg.toFixed(1)}</span></div>
                    </div>
                    <div className="card">
                      <h3>G - xG</h3>
                      <div className={`big mono ${parseFloat(summary.gxg) > 0 ? 'xg-positive' : 'xg-negative'}`}>
                        {parseFloat(summary.gxg) > 0 ? '+' : ''}{summary.gxg}
                      </div>
                    </div>
                  </div>
                )}
                <div className="card">
                  <h3>Laukaisukartta — {team || 'Kaikki joukkueet'} — {season}</h3>
                  <div className="legend">
                    <span><div className="dot" style={{background:'var(--goal)'}}></div> Maali</span>
                    <span><div className="dot" style={{background:'var(--save)'}}></div> Torjunta</span>
                    <span><div className="dot" style={{background:'var(--block)'}}></div> Peitetty</span>
                    <span><div className="dot" style={{background:'var(--miss)'}}></div> Ohi</span>
                  </div>
                  <Rink shots={filteredShots} />
                </div>
              </>
            )}
          </div>
        )}

        {tab === 'players' && (
          <div className="card">
            <h3>Pelaajat xG-pörssi — {team || 'Kaikki'} — {season}</h3>
            <PlayerTable players={players} season={season} team={team} />
          </div>
        )}

        {tab === 'ilves' && (
          <div>
            <div className="card" style={{marginBottom:20}}>
              <h3>Ilves — 3 kauden kehitys</h3>
              <TeamXGBars teams={teams} />
            </div>
            <div className="card">
              <h3>Ilves pelaajat — {season}</h3>
              <PlayerTable players={players} season={season} team="Ilves" />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
